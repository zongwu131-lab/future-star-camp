<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来星暑假训练营 · 在线报名</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --c1:#3a2a8c;   /* 靛蓝 */
    --c2:#7240b8;   /* 紫 */
    --c3:#c06bd1;   /* 粉紫 */
    --glow1:#7dd3fc; /* 青色星球 */
    --glow2:#fca5e0; /* 粉色星球 */
    --glow3:#fde68a; /* 金色星球 */
    --glass:rgba(255,255,255,0.14);
    --glass-border:rgba(255,255,255,0.35);
    --text:#fdfbff;
    --text-dim:#e3d9f7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Noto Sans SC', sans-serif;
    color:var(--text);
    background:linear-gradient(160deg, var(--c1) 0%, var(--c2) 50%, var(--c3) 100%);
    overflow-x:hidden;
    position:relative;
  }
  .display{font-family:'Baloo 2', 'Noto Sans SC', sans-serif;}

  /* 星空 */
  #stars{position:fixed; inset:0; z-index:0; pointer-events:none;}
  .star{
    position:absolute; background:#fff; border-radius:50%;
    opacity:.8; animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.2; transform:scale(.8);}
    50%{opacity:1; transform:scale(1.2);}
  }

  /* 发光星球 */
  .planet{position:fixed; border-radius:50%; filter:blur(0.5px); z-index:0; pointer-events:none; animation:float 9s ease-in-out infinite;}
  .planet::after{content:''; position:absolute; inset:-40%; border-radius:50%; filter:blur(30px); background:inherit; opacity:.55; z-index:-1;}
  @keyframes float{0%,100%{transform:translateY(0px);} 50%{transform:translateY(-22px);}}

  .planet-1{width:90px; height:90px; top:8%; left:8%; background:radial-gradient(circle at 32% 30%, #e0f7ff, var(--glow1) 60%, #0ea5e9 100%); animation-delay:0s;}
  .planet-2{width:60px; height:60px; top:18%; right:10%; background:radial-gradient(circle at 35% 30%, #fff0fa, var(--glow2) 60%, #d946ef 100%); animation-delay:2s;}
  .planet-3{width:46px; height:46px; bottom:12%; left:12%; background:radial-gradient(circle at 35% 30%, #fffbe8, var(--glow3) 60%, #f59e0b 100%); animation-delay:4s;}
  .planet-4{width:34px; height:34px; bottom:22%; right:14%; background:radial-gradient(circle at 35% 30%, #f3e8ff, var(--glow2) 55%, #a855f7 100%); animation-delay:1s;}

  .wrap{position:relative; z-index:1; max-width:880px; margin:0 auto; padding:56px 20px 80px;}

  header{text-align:center; margin-bottom:36px;}
  .eyebrow{
    display:inline-block; font-size:13px; letter-spacing:.18em; color:var(--text-dim);
    background:var(--glass); border:1px solid var(--glass-border); padding:6px 16px; border-radius:999px;
    backdrop-filter:blur(8px);
  }
  h1{font-size:clamp(34px,6vw,52px); margin:18px 0 10px; font-weight:800; line-height:1.15;
     text-shadow:0 4px 24px rgba(60,20,90,.35);}
  .sub{color:var(--text-dim); font-size:16px; max-width:520px; margin:0 auto;}

  /* 毛玻璃卡片 */
  .glass{
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:22px;
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    box-shadow:0 8px 32px rgba(30,10,60,.25);
  }

  /* 统计区 */
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:40px;}
  .stat-card{padding:22px 12px; text-align:center;}
  .stat-num{font-size:clamp(26px,5vw,36px); font-weight:800; font-family:'Baloo 2';}
  .stat-label{font-size:13px; color:var(--text-dim); margin-top:4px;}

  /* 表单 */
  .form-card{padding:32px 28px;}
  .form-card h2{margin:0 0 4px; font-size:22px; font-weight:700;}
  .form-card p.hint{margin:0 0 24px; color:var(--text-dim); font-size:14px;}
  label{display:block; font-size:14px; font-weight:500; margin-bottom:6px; color:var(--text);}
  .req{color:#fecaca;}
  input,textarea{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.4);
    background:rgba(255,255,255,.92); color:#231248; font-size:15px; font-family:inherit;
    outline:none; transition:box-shadow .15s, border-color .15s;
  }
  input::placeholder, textarea::placeholder{color:#9182b3;}
  input:focus, textarea:focus{border-color:#fff; box-shadow:0 0 0 3px rgba(255,255,255,.35);}
  textarea{resize:vertical; min-height:80px;}
  .field{margin-bottom:18px;}
  .field-err{color:#ffd6e8; font-size:12px; margin-top:4px; min-height:14px;}
  .submit-btn{
    width:100%; padding:14px; border:none; border-radius:14px; cursor:pointer;
    font-size:16px; font-weight:700; font-family:'Baloo 2';
    background:linear-gradient(120deg,#ffd56b,#ff9ed1); color:#3a1248;
    box-shadow:0 8px 20px rgba(255,150,200,.35);
    transition:transform .12s ease;
  }
  .submit-btn:hover{transform:translateY(-2px);}
  .submit-btn:disabled{opacity:.6; cursor:not-allowed; transform:none;}
  .success-msg{
    margin-top:16px; padding:14px 16px; border-radius:12px; background:rgba(134,239,172,.18);
    border:1px solid rgba(134,239,172,.5); color:#dcfce7; font-size:14px; display:none;
  }

  /* 管理员区域 */
  .admin-section{margin-top:48px;}
  .admin-toggle{
    background:none; border:1px solid var(--glass-border); color:var(--text-dim);
    padding:8px 18px; border-radius:999px; font-size:13px; cursor:pointer; backdrop-filter:blur(8px);
  }
  .admin-panel{padding:26px; margin-top:16px; display:none;}
  .admin-panel.open{display:block;}
  .admin-login{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .admin-login input{width:auto; flex:1; min-width:160px;}
  .ghost-btn{
    padding:11px 20px; border-radius:12px; border:1px solid var(--glass-border);
    background:rgba(255,255,255,.18); color:var(--text); cursor:pointer; font-size:14px; font-weight:500;
  }
  .ghost-btn.danger{background:rgba(248,113,113,.22); border-color:rgba(248,113,113,.55);}
  table{width:100%; border-collapse:collapse; margin-top:18px; font-size:13.5px;}
  th,td{padding:10px 8px; text-align:left; border-bottom:1px solid rgba(255,255,255,.18);}
  th{color:var(--text-dim); font-weight:500;}
  .table-wrap{overflow-x:auto;}
  .admin-err{color:#ffd6e8; font-size:13px; margin-top:8px;}
  .small-dim{color:var(--text-dim); font-size:12.5px;}

  footer{text-align:center; margin-top:50px; color:var(--text-dim); font-size:12.5px;}

  @media(max-width:520px){
    .stats{grid-template-columns:1fr 1fr 1fr; gap:8px;}
    .stat-card{padding:14px 6px;}
    .form-card{padding:24px 18px;}
  }
</style>
</head>
<body>

<div id="stars"></div>
<div class="planet planet-1"></div>
<div class="planet planet-2"></div>
<div class="planet planet-3"></div>
<div class="planet planet-4"></div>

<div class="wrap">

  <header>
    <span class="eyebrow">SUMMER CAMP 2026</span>
    <h1 class="display">🚀 未来星暑假训练营</h1>
    <p class="sub">点亮孩子的暑假，和我们一起出发，探索属于未来星的奇妙旅程</p>
  </header>

  <!-- 公开汇总统计 -->
  <section class="stats" id="stats">
    <div class="glass stat-card">
      <div class="stat-num" id="statBatches">--</div>
      <div class="stat-label">报名批次</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-num" id="statPeople">--</div>
      <div class="stat-label">报名总人数</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-num" id="statSchools">--</div>
      <div class="stat-label">涉及学校数</div>
    </div>
  </section>

  <!-- 报名表单 -->
  <section class="glass form-card">
    <h2>填写报名信息</h2>
    <p class="hint">请认真填写以下信息，我们会尽快与您联系确认。</p>

    <form id="regForm" novalidate>
      <div class="field">
        <label>姓名 <span class="req">*</span></label>
        <input type="text" id="f_name" placeholder="请填写学生姓名" required>
        <div class="field-err" id="err_name"></div>
      </div>

      <div class="field">
        <label>联系电话 <span class="req">*</span></label>
        <input type="tel" id="f_phone" placeholder="请填写家长手机号码" required>
        <div class="field-err" id="err_phone"></div>
      </div>

      <div class="field">
        <label>学校名称 <span class="req">*</span></label>
        <input type="text" id="f_school" placeholder="请填写就读学校" required>
        <div class="field-err" id="err_school"></div>
      </div>

      <div class="field">
        <label>报名人数（含本人） <span class="req">*</span></label>
        <input type="number" id="f_count" min="1" max="20" placeholder="1-20 之间的数字" required>
        <div class="field-err" id="err_count"></div>
      </div>

      <div class="field">
        <label>同行人姓名（选填）</label>
        <input type="text" id="f_companions" placeholder="如多人报名请填写，逗号分隔">
      </div>

      <div class="field">
        <label>备注留言（选填）</label>
        <textarea id="f_note" placeholder="有什么想告诉我们的，都可以写在这里～"></textarea>
      </div>

      <div class="field">
        <label>指导老师</label>
        <input type="text" id="f_teacher" value="心语老师">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">✨ 提交报名</button>
      <div class="success-msg" id="successMsg">报名成功！感谢您的信任，我们会尽快与您联系 🎉</div>
    </form>
  </section>

  <!-- 管理员区域 -->
  <section class="admin-section">
    <button class="admin-toggle" id="adminToggleBtn">管理员入口</button>

    <div class="glass admin-panel" id="adminPanel">
      <div id="adminLoginBox">
        <label>请输入管理密码查看报名明细</label>
        <div class="admin-login">
          <input type="password" id="adminPwd" placeholder="管理密码">
          <button class="ghost-btn" id="adminLoginBtn">查看明细</button>
        </div>
        <div class="admin-err" id="adminErr"></div>
      </div>

      <div id="adminListBox" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
          <span class="small-dim" id="adminCount"></span>
          <button class="ghost-btn danger" id="clearBtn">清空所有记录</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>姓名</th><th>电话</th><th>学校</th><th>人数</th><th>同行人</th><th>备注</th><th>老师</th><th>提交时间</th>
              </tr>
            </thead>
            <tbody id="adminTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <footer>未来星暑假训练营 © 2026　·　数据由 Neon 数据库安全存储</footer>
</div>

<script>
  // 生成星星
  (function makeStars(){
    const box = document.getElementById('stars');
    const n = 90;
    for(let i=0;i<n;i++){
      const s = document.createElement('div');
      s.className='star';
      const size = Math.random()*2.4+1;
      s.style.width = size+'px';
      s.style.height = size+'px';
      s.style.left = Math.random()*100+'vw';
      s.style.top = Math.random()*100+'vh';
      s.style.animationDelay = (Math.random()*3)+'s';
      s.style.animationDuration = (2+Math.random()*2.5)+'s';
      box.appendChild(s);
    }
  })();

  async function loadStats(){
    try{
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('statBatches').textContent = data.batches ?? 0;
      document.getElementById('statPeople').textContent = data.total_people ?? 0;
      document.getElementById('statSchools').textContent = data.school_count ?? 0;
    }catch(e){ console.error(e); }
  }
  loadStats();

  const phoneRe = /^1[3-9]\d{9}$/;

  function setErr(id, msg){ document.getElementById(id).textContent = msg || ''; }

  document.getElementById('regForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    let ok = true;
    const name = document.getElementById('f_name').value.trim();
    const phone = document.getElementById('f_phone').value.trim();
    const school = document.getElementById('f_school').value.trim();
    const countRaw = document.getElementById('f_count').value.trim();
    const companions = document.getElementById('f_companions').value.trim();
    const note = document.getElementById('f_note').value.trim();
    const teacher = document.getElementById('f_teacher').value.trim() || '心语老师';

    setErr('err_name',''); setErr('err_phone',''); setErr('err_school',''); setErr('err_count','');

    if(!name){ setErr('err_name','请填写姓名'); ok=false; }
    if(!phone){ setErr('err_phone','请填写联系电话'); ok=false; }
    else if(!phoneRe.test(phone)){ setErr('err_phone','手机号格式不正确'); ok=false; }
    if(!school){ setErr('err_school','请填写学校名称'); ok=false; }
    const count = parseInt(countRaw,10);
    if(!countRaw || isNaN(count) || count<1 || count>20){ setErr('err_count','请输入 1-20 之间的数字'); ok=false; }

    if(!ok) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '提交中...';

    let result;
    try{
      const res = await fetch('/api/submit', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name, phone, school, count, companions, note, teacher })
      });
      result = await res.json();
      if(!res.ok) throw new Error(result.error || '提交失败');
    }catch(err){
      btn.disabled = false; btn.textContent = '✨ 提交报名';
      alert('提交失败，请稍后重试：' + err.message);
      return;
    }

    btn.disabled = false; btn.textContent = '✨ 提交报名';

    document.getElementById('successMsg').style.display='block';
    document.getElementById('regForm').reset();
    document.getElementById('f_teacher').value = '心语老师';
    loadStats();
  });

  // 管理员面板
  const adminToggleBtn = document.getElementById('adminToggleBtn');
  const adminPanel = document.getElementById('adminPanel');
  adminToggleBtn.addEventListener('click', ()=>{
    adminPanel.classList.toggle('open');
  });

  document.getElementById('adminLoginBtn').addEventListener('click', async ()=>{
    const pwd = document.getElementById('adminPwd').value;
    document.getElementById('adminErr').textContent = '';
    try{
      const res = await fetch('/api/admin-list', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || '密码错误');
      renderAdminList(data.rows);
      document.getElementById('adminLoginBox').style.display='none';
      document.getElementById('adminListBox').style.display='block';
    }catch(err){
      document.getElementById('adminErr').textContent = '密码错误，请重试';
    }
  });

  document.getElementById('clearBtn').addEventListener('click', async ()=>{
    if(!confirm('确定要清空所有报名记录吗？此操作不可恢复！')) return;
    const pwd = document.getElementById('adminPwd').value;
    try{
      const res = await fetch('/api/admin-clear', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || '操作失败');
      renderAdminList([]);
      loadStats();
      alert('已清空所有记录');
    }catch(err){
      alert('操作失败：' + err.message);
    }
  });

  function renderAdminList(rows){
    const tbody = document.getElementById('adminTbody');
    tbody.innerHTML='';
    document.getElementById('adminCount').textContent = `共 ${rows.length} 条记录`;
    rows.forEach(r=>{
      const tr = document.createElement('tr');
      const t = new Date(r.created_at).toLocaleString('zh-CN');
      tr.innerHTML = `<td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.phone)}</td><td>${escapeHtml(r.school)}</td><td>${r.count}</td><td>${escapeHtml(r.companions||'')}</td><td>${escapeHtml(r.note||'')}</td><td>${escapeHtml(r.teacher)}</td><td>${t}</td>`;
      tbody.appendChild(tr);
    });
  }
  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>
</body>
</html>
